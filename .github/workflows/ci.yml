name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  rust:
    name: Rust check + test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: hydeclaw_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/hydeclaw_test
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Check
        run: cargo check --all-targets

      - name: Run migrations
        run: cargo run --bin run_migrations

      - name: Test
        run: cargo test

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

  audit:
    name: cargo audit (RustSec advisories)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install cargo-audit
        run: cargo install --locked cargo-audit

      - name: Audit dependencies
        # Reads ignore policy from .cargo/audit.toml. Each ignore there must
        # carry a rationale. Re-evaluate on every release.
        run: cargo audit --deny warnings

  frontend:
    name: UI typecheck + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

  toolgate:
    name: Toolgate (Python) tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: toolgate
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: toolgate/requirements.txt

      - name: Install runtime deps
        run: pip install -r requirements.txt

      - name: Install dev deps
        run: pip install -r requirements-dev.txt

      - name: Pytest
        # Toolgate test suite — covers normalize, registry, SSRF helpers,
        # provider config validation, TTS local synthesis. Runs without
        # external services (no Postgres, no OTel collector).
        run: pytest -q

  channels:
    name: Channels (Bun) tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: channels
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install
        run: bun install --frozen-lockfile

      - name: TypeScript strict check
        # tsc --noEmit gates merges on type-correctness. `bun test`
        # uses the Bun TS runtime which is more permissive than tsc, so
        # this is the only place strict types are enforced.
        run: npx tsc --noEmit

      - name: Test
        # Bun test runner — covers driver factories, formatting prompts,
        # session loop helpers. No external services required.
        # `formatting.test.ts` reads workspace/prompts/formatting/*.md;
        # those files ARE tracked in git, so a fresh checkout on the
        # runner provides them. (Locally on Pi the tests fail because
        # deploy never copies workspace/prompts/ to ~/hydeclaw/ — that
        # path is intentionally agent-state-managed, not a deploy
        # artifact.)
        run: bun test

  identity-contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: bash scripts/check-no-content-dedup.sh

  types-drift:
    name: API types drift check
    runs-on: ubuntu-latest
    needs: [rust]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: v2
          cache-on-failure: true

      - name: Generate types
        run: make gen-types

      - name: Check no drift
        run: |
          git diff --exit-code \
            ui/src/types/api.generated.ts \
            channels/src/types.generated.ts \
            ui/src/types/sse.generated.ts \
            || (echo "::error::Generated TS types are out of date. Run 'make gen-types' locally and commit the result." && exit 1)

  channels-fixtures-drift:
    name: Channels round-trip fixtures drift check
    runs-on: ubuntu-latest
    needs: [rust]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: v2
          cache-on-failure: true

      - name: Generate channel WS fixtures
        run: cargo test -p hydeclaw-types --test channels_wire

      - name: Check no fixture drift
        run: |
          git diff --exit-code channels/src/__tests__/fixtures/ \
            || (echo "::error::Channel WS fixtures drifted. Run 'cargo test -p hydeclaw-types --test channels_wire' locally and commit the regenerated fixtures." && exit 1)

  sse-fixtures-drift:
    name: SSE round-trip fixtures drift check
    runs-on: ubuntu-latest
    needs: [rust]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: v2
          cache-on-failure: true

      - name: Generate SSE fixtures
        run: cargo test -p hydeclaw-types --test sse_wire

      - name: Check no fixture drift
        run: |
          git diff --exit-code ui/src/__tests__/fixtures/sse/ \
            || (echo "::error::SSE fixtures drifted. Run 'cargo test -p hydeclaw-types --test sse_wire' locally and commit the regenerated fixtures." && exit 1)
