# Agent Configuration Scaffold (Base Agent)
# ── Subagent delegation policy ──────────────────────────────────────────
# Controls how this agent's `agent` tool spawns subagents.
# Section is OPTIONAL — defaults are sane.
#
# [agent.delegation]
# max_depth = 1                       # Default. Subagents CANNOT recurse.
                                       # Set to 2+ for orchestrator pattern.
# blocked_tools_extra = ["code_exec"] # Added on top of built-in deny list.
# blocked_tools_override = []          # If non-empty, REPLACES built-in deny list.
                                       # Use with care.
