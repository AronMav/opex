name: timezone_info
description: "Current time, date, and timezone info via TimeAPI.io. Returns datetime, DST status, and day of week."
endpoint: "https://timeapi.io/api/time/current/zone?timeZone={timezone}"
method: GET
parameters:
  timezone:
    type: string
    required: true
    location: query
    description: "IANA timezone: Europe/Moscow, Europe/Samara, America/New_York, Asia/Tokyo, UTC"
response_transform: "$"
status: verified
