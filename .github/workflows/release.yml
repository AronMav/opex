name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    name: Build & publish
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Install Zig
        uses: mlugg/setup-zig@v1
        with:
          version: 0.13.0

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu,x86_64-unknown-linux-gnu

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Install cargo-zigbuild
        run: cargo install cargo-zigbuild --locked

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Build release
        run: ./release.sh "${{ steps.ver.outputs.version }}" --all

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: OPEX v${{ steps.ver.outputs.version }}
          files: release/opex-*.tar.gz
          # Explicitly disable any automatic release notes generation.
          # The release body is authored manually after the workflow
          # finishes (`gh release edit <tag> --notes-file ...`). This
          # keeps the release page authoritative and reviewable —
          # auto-generated commit dumps are noisy and incentivise
          # treating the release page as a build log instead of a
          # changelog.
          generate_release_notes: false
          body: ""
