name: search_web
description: "Web search via Ollama Cloud — returns relevant web results with page-content snippets. Use as the primary search tool."
endpoint: "https://ollama.com/api/web_search"
method: POST
parallel: true
parameters:
  query:
    type: string
    required: true
    location: body
    description: "Search query"
  max_results:
    type: integer
    required: false
    location: body
    description: "Maximum number of results (default 5, up to 10)"
    default: 5
body_template: |
  {"query": "{{query}}", "max_results": {{max_results}}}
auth:
  type: bearer_env
  key: OLLAMA_API_KEY
response_transform: "$.results"

status: verified
