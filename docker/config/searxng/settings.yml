use_default_settings: true

general:
  instance_name: "HydeClaw Search"
  debug: false

search:
  safe_search: 0
  autocomplete: ""
  default_lang: "ru"
  formats:
    - html
    - json

server:
  secret_key: "hydeclaw-searxng-secret-change-me"
  limiter: false
  image_proxy: false
  port: 8080
  bind_address: "0.0.0.0"

ui:
  static_use_hash: true
  default_theme: simple
  theme_args:
    simple_style: dark

engines:
  - name: google
    engine: google
    shortcut: g

  - name: duckduckgo
    engine: duckduckgo
    shortcut: ddg

  - name: wikipedia
    engine: wikipedia
    shortcut: wp

  - name: github
    engine: github
    shortcut: gh
    disabled: true

  - name: stackoverflow
    engine: stackoverflow
    shortcut: so
    disabled: true
