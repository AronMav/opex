# Agent Configuration Scaffold (Base Agent)

# ── Heartbeat (automated maintenance) ──────────────────────────────────────
# Runs the HEARTBEAT.md procedure on a cron schedule.
# Section is OPTIONAL. When present, the agent receives automated heartbeat
# messages at the specified cron expression.
#
[agent.heartbeat]
cron = "0 3 * * 0"                      # Sunday 3 AM UTC (weekly skill maintenance)
timezone = "UTC"                         # Optional — if omitted, cron is UTC
# announce_to = "telegram"              # Optional — announce results to this channel

# ── Subagent delegation policy ──────────────────────────────────────────
# Controls how this agent's `agent` tool spawns subagents.
# Section is OPTIONAL — defaults are sane.
#
# [agent.delegation]
# max_depth = 1                       # Default. Subagents CANNOT recurse.
                                       # Set to 2+ for orchestrator pattern.
# blocked_tools_extra = ["code_exec"] # Added on top of built-in deny list (runtime + visibility).
# blocked_tools_override = []          # NOT honoured at runtime. The hard safety net
                                       # (SUBAGENT_DENIED_TOOLS — cron, secret_set, process,
                                       # code_exec, workspace_delete, workspace_rename) cannot
                                       # be weakened by override. See docs/ARCHITECTURE.md,
                                       # audit 2026-05-08 groups T and FF.
