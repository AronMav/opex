name: synthesize_speech
description: "Send a voice message to the user via the channel. Use when the user asks to read aloud, send voice, or respond by voice. The voice/timbre is determined by the agent's TTS-provider configuration — you do not pick it here."
endpoint: "http://localhost:9011/v1/audio/speech"
method: POST
parameters:
  text:
    type: string
    required: true
    location: body
    description: "Text to synthesize"
body_template: |
  {"input": "{{text}}", "response_format": "opus"}
channel_action:
  action: send_voice
  data_field: "_binary"

status: verified
