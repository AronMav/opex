[watchdog]
enabled = true
interval_secs = 60
cooldown_secs = 300
grace_period_secs = 60
flap_window_secs = 600
flap_threshold = 3
# Self-healing: устойчиво-проблемные docker-контейнеры → триггер Opex через
# /api/internal/infra-event. Opt-in kill-switch, default false. Uncomment to
# enable after the feature has been validated on this host.
# self_healing_enabled = true

[[checks]]
name = "core"
url = "http://localhost:18789/health"
restart_cmd = "systemctl --user restart opex-core"

[[checks]]
name = "postgres"
check_cmd = "docker exec docker-postgres-1 pg_isready -U opex"
restart_cmd = "docker restart docker-postgres-1"

[[checks]]
name = "channels"
url = "http://localhost:3100/health"
restart_cmd = "curl -sf -X POST http://localhost:18789/api/services/channels/restart"

[[checks]]
name = "toolgate"
url = "http://localhost:9011/health"
restart_cmd = "curl -sf -X POST http://localhost:18789/api/services/toolgate/restart"

[[checks]]
name = "memory"
check_cmd = "systemctl --user is-active opex-memory-worker"
restart_cmd = "systemctl --user restart opex-memory-worker"

[resources]
disk_warning_gb = 5
disk_critical_gb = 1
ram_warning_percent = 85
ram_critical_percent = 95
check_interval_secs = 300
