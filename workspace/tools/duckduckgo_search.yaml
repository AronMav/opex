name: duckduckgo_search
description: "Quick factual answers via DuckDuckGo Instant Answer API. Free, no API key. Returns structured answers, definitions, and summaries. For full web search use search_web."
endpoint: "https://api.duckduckgo.com/"
method: GET
parameters:
  q:
    type: string
    required: true
    location: query
    description: "Search query"
  format:
    type: string
    location: query
    default: "json"
  no_html:
    type: string
    location: query
    default: "1"
  skip_disambig:
    type: string
    location: query
    default: "1"
response_transform: "$"

status: verified
