# Toolgate (media hub: STT/Vision/TTS/ImageGen/Embeddings) base URL.
# Read by the web media endpoints (api_media_transcribe / describe / imagegen);
# without it those return 503 "… not configured" even though toolgate is running.
toolgate_url = "http://localhost:9011"

[gateway]
listen = "0.0.0.0:18789"
auth_token_env = "OPEX_AUTH_TOKEN"
public_url = "http://your-server:18789"

[database]
url = "postgresql://opex:opex@localhost:5432/opex"

[limits]
max_requests_per_minute = 100
max_tool_concurrency = 10
# Phase 64 SEC-04: cap for POST /api/restore body. Oversized uploads are rejected
# with 413 Payload Too Large within 100ms (Content-Length fast-path) + streaming
# byte counter (aborts mid-stream if CL header is absent or lies). Defaults to 500.
max_restore_size_mb = 500

# Phase 64 SEC-03: signed-URL HMAC verification for /uploads/*
[uploads]
signed_url_ttl_secs = 86400
require_signature = true

# F130: [typing] removed — it had no field in AppConfig and was silently
# parsed-and-discarded. Typing mode is resolved per-channel from the
# agent_channels config (channel_ws/handshake.rs reads `typing_mode`), never
# from opex.toml.

[subagents]
enabled = true
default_mode = "in-process"
max_concurrent_in_process = 5
max_concurrent_docker = 3
docker_timeout = "5m"
in_process_timeout = "2m"

# ═══ Docker service management ═══

[docker]
compose_file = "docker/docker-compose.yml"
rebuild_allowed = ["browser-renderer"]
rebuild_timeout_secs = 300

# ═══ Native managed processes (spawned by Core, not Docker) ═══

[[managed_process]]
name = "channels"
command = ["bun", "run", "src/index.ts"]
working_dir = "channels"
env_passthrough = ["OPEX_AUTH_TOKEN"]
env_extra = { OPEX_CORE_WS = "ws://localhost:18789", HEALTH_PORT = "3100" }
health_url = "http://localhost:3100/health"
port = 3100
memory_max = "256M"

[[managed_process]]
name = "toolgate"
command = [".venv/bin/python", "-m", "uvicorn", "app:app", "--host", "0.0.0.0", "--port", "9011", "--workers", "1", "--loop", "asyncio", "--limit-concurrency", "50"]
working_dir = "toolgate"
env_passthrough = ["OPEX_AUTH_TOKEN"]
env_extra = { AUTH_TOKEN = "${OPEX_AUTH_TOKEN}", INTERNAL_NETWORK = "127.0.0.0/8", CORE_API_URL = "http://localhost:18789" }
health_url = "http://localhost:9011/health"
port = 9011
memory_max = "256M"

# ═══ Sandbox (code execution in agent containers) ═══

[sandbox]
enabled = true
image = "opex-sandbox:latest"
extra_binds = []

# ═══ Memory (embedding via toolgate) ═══

[memory]
# embed_dim = 2560  # auto-detected at startup

# ═══ Memory Worker (separate binary for heavy tasks) ═══

[memory_worker]
enabled = true
poll_interval_secs = 5
# REF-04: primary wake is PostgreSQL LISTEN/NOTIFY on channel `memory_tasks_new`
# (migration 023 installs the AFTER INSERT trigger). The poll loop above remains
# as the catch-up safety net (HCS-4 — operators depend on it as an override).
# Set `notify_mode = "poll"` to force pure-polling mode (debug / back-compat).
notify_mode = "listen"

# ═══ Automatic Backups ═══

[backup]
enabled = true
cron = "0 3 * * *"
retention_days = 7

# ═══ Shadow-git checkpoint store (workspace snapshots + /rollback) ═══
# [checkpoint]
# enabled = true                              # kill-switch shadow-git чекпойнтов
# keep = 50                                   # хранить последние N чекпойнтов на агента
# ttl_days = 14                               # удалять чекпойнты старше N дней
# store_path = "~/.opex/checkpoints/store"    # bare-git store (общий на всех агентов)
# max_file_size_mb = 5                        # файлы крупнее не попадают в снапшот
# excludes = []                               # доп. паттерны поверх встроенных (node_modules, target, *.log, бинарники)

# ═══ Runtime decision-webhooks (per-agent, в config/agents/{Name}.toml) ═══
#
# Хуки задаются в конфиге агента под ключом [agent.hooks], а не здесь.
# Пример для config/agents/MyAgent.toml:
#
# [[agent.hooks.webhooks]]
# url = "http://hooks.local:9000/gate"   # admin-hosted hook service
# events = ["BeforeToolCall"]            # BeforeMessage|BeforeToolCall|AfterToolResult
# mode = "decision"                      # "async" (fire-and-forget, default) | "decision" (sync, parse response)
# tool_matcher = "code_exec|workspace_.*" # regex on tool_name (decision tool-events)
# on_failure = "open"                    # "open" (continue, default) | "closed" (block on hook failure)
# timeout_ms = 3000                      # sync decision timeout (cap 30000)
# allow_internal = false                 # true → bypass SSRF (localhost/LAN hook service)
# Decision response JSON: {"decision":"block","reason":"..."} | {"modified_args":{...}}
#   | {"inject_context":"..."} | {"transformed_result":"..."} | {} (continue)

# ═══ Multi-agent timeouts (`agent` tool: run/message/collect/status/kill) ═══
# Hot-reloadable via config watcher and PUT /api/config.
# Invariant (warned-only): safety_timeout_secs > message_wait_for_idle_secs + message_result_secs.

[agent_tool]
message_wait_for_idle_secs = 60   # how long to wait for target agent to become idle before sending a message
message_result_secs = 300         # how long sync run/message/collect blocks waiting for a result
safety_timeout_secs = 600         # outer defense-in-depth wrapper (must be > 60 + 300)
default_tool_timeout_secs = 120   # outer wrapper for any non-`agent` tool (was hardcoded 120s)

# Per-tool outer-timeout overrides (tool -> seconds). generate_image proxies to
# ComfyUI (comfyui-krea2 comfy_timeout_secs=400); its wrapper must exceed that
# or slow-but-valid generations get killed early. Keep override > backend cap.
[agent_tool.tool_timeout_overrides]
generate_image = 450

# ═══ Video summarization ═══
# F123: only `digest_provider` / `digest_model` are read at runtime
# (gateway/handlers/llm.rs). The former scene_threshold / frame_ceiling /
# job_timeout_secs / url_allowlist / note_max_frames / vault_name keys were REMOVED
# — the in-core video worker was deleted in Phase 6 (m068) and nothing reads them;
# toolgate's summarize_video handler reads its own env vars. (The video-URL
# allowlist is hardcoded in pipeline/subagent.rs::is_supported_video_host.)

[video]
# Override LLM provider for the video digest step (name from the providers table).
# When unset, the digest uses the job-owning agent's own LLM provider.
# Useful for routing the digest to a large-context or local model without
# changing the agent's own provider connection.
# digest_provider = "ollama-local"
# Optional model override for the digest provider (uses provider default when absent).
# digest_model = "qwen3:32b"

# ═══ Global tool dispatcher ═══
[tool_dispatcher]
# Extension tools promoted into the native tools[] of every dispatcher-mode
# agent (main agents AND dispatcher-mode subagents), and hidden from the
# tool_use catalogue/hint/suppressor. Fixes weak-prompt-adherence models
# (e.g. glm-5.2) writing these as free-form text instead of calling them.
# Distinct from the per-agent [agent.tool_dispatcher]. Empty = no change.
always_core = ["sequentialthinking"]
