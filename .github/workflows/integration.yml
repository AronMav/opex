name: Integration

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  CARGO_TERM_COLOR: always
  # Force rustls everywhere — defence-in-depth alongside the cargo tree assertion.
  # See Phase 65 OBS-06: the `rustls-only-assertion` job below codifies this
  # invariant permanently across both --no-default-features and --features otel.
  RUSTFLAGS: ""

jobs:
  integration-x86_64:
    name: Integration tests (x86_64) + rustls invariant
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: hydeclaw_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          key: integration-x86_64

      # Docker is preinstalled on ubuntu-latest GitHub runners — verify it's up.
      - name: Verify Docker daemon
        run: |
          docker version
          docker info

      - name: Build all test binaries
        run: cargo build --tests -p hydeclaw-core

      # Full test suite. testcontainers-backed tests (integration_smoke, plus
      # Wave-2 binaries created by Plans 03/04/05) will spin up ephemeral PG
      # via the Docker daemon above. #[sqlx::test] unit tests use the service
      # postgres above via DATABASE_URL.
      - name: Run integration tests
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/hydeclaw_test
        run: cargo test -p hydeclaw-core --tests

  # Phase 65 OBS-06: rustls-only invariant — no OpenSSL in the transitive
  # dep graph under EITHER feature configuration. Protects against silent
  # regressions from the Phase 65 OTel 0.31 bump (Plan 01) or from any
  # future crate that has a wrong default-features leak.
  #
  # Runs on BOTH `--no-default-features` (release.sh binary — Pi constraint)
  # AND `--features otel` (operator opt-in binary — tonic + opentelemetry-otlp
  # CAN drag in openssl if a wrong feature flag is chosen).
  #
  # `cargo tree -i openssl` exits non-zero (code 101) when openssl is NOT
  # in the graph — that's the success path. Failure is STATUS==0 AND
  # non-empty stdout. Defence-in-depth: `native-tls` is also checked
  # because it is the canonical carrier that pulls openssl transitively.
  rustls-only-assertion:
    name: rustls-only (${{ matrix.features.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        features:
          - name: default
            flag: "--no-default-features"
          - name: otel
            flag: "--features otel"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          key: rustls-only-${{ matrix.features.name }}
      - name: Assert no OpenSSL transitive dependency
        run: |
          set +e
          OUTPUT=$(cargo tree ${{ matrix.features.flag }} -i openssl 2>&1)
          STATUS=$?
          set -e
          if [ "$STATUS" -eq 0 ] && [ -n "$OUTPUT" ]; then
            echo "::error::OpenSSL transitive dependency detected under ${{ matrix.features.name }} — rustls-only invariant violated"
            echo "$OUTPUT"
            exit 1
          fi
          echo "rustls invariant OK for ${{ matrix.features.name }} (no openssl in tree)"
      # Defence-in-depth: also check `native-tls` which often pulls openssl transitively.
      - name: Assert no native-tls
        run: |
          set +e
          OUTPUT=$(cargo tree ${{ matrix.features.flag }} -i native-tls 2>&1)
          STATUS=$?
          set -e
          if [ "$STATUS" -eq 0 ] && [ -n "$OUTPUT" ]; then
            echo "::warning::native-tls transitive dependency detected under ${{ matrix.features.name }} — likely openssl carrier"
            echo "$OUTPUT"
            exit 1
          fi
          echo "native-tls absent for ${{ matrix.features.name }}"

  integration-aarch64:
    name: Integration tests (aarch64 / QEMU)
    runs-on: ubuntu-latest
    # Pre-existing flaky job — the `uraimo/run-on-arch-action` container runs
    # out of memory linking `icu_properties_data` under QEMU, producing
    # `cc: signal: 11 (SIGSEGV) (core dumped)`. Every integration run since
    # 2026-04-17 has failed here regardless of test content. Tracking as
    # tech debt: the real fix is a self-hosted Pi runner (mentioned in the
    # step comment below). Meanwhile `continue-on-error: true` keeps the
    # Integration workflow green on the signals we CAN trust (x86_64 tests,
    # macOS + Windows path canonicalize, rustls invariant, Ubuntu path
    # canonicalize) while still surfacing the aarch64 failure as a warning
    # in the run summary. v0.19.4 code-review follow-up.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      # ARM64 emulation. We compile the full test suite + run the non-Docker
      # subset (mock_provider, sse_lifecycle, shutdown_drain). The latter two
      # are relevant on ARM64 because they exercise tokio mpsc channels and
      # CancellationToken paths whose memory ordering differs between x86_64
      # (TSO) and aarch64 (weaker model). testcontainers-backed binaries
      # (integration_smoke, integration_approval_race) are compiled but not
      # executed here — Docker-in-QEMU is unreliable. A self-hosted Pi
      # runner can be added in a future phase to close that gap.
      - name: Build & run non-Docker tests on aarch64
        uses: uraimo/run-on-arch-action@v2
        with:
          arch: aarch64
          distro: ubuntu22.04
          githubToken: ${{ github.token }}
          # Cache cargo registry across runs for speed.
          dockerRunArgs: |
            --volume "${PWD}:/workspace"
          install: |
            apt-get update -q
            apt-get install -y --no-install-recommends \
              curl build-essential pkg-config ca-certificates
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
              | sh -s -- -y --default-toolchain stable --profile minimal
          run: |
            source "$HOME/.cargo/env"
            cd /workspace
            cargo build --tests -p hydeclaw-core
            # Run ALL integration binaries that DO NOT need Docker.
            # Each is a separate cargo invocation so individual failures
            # produce a clear log signature.
            cargo test -p hydeclaw-core --test integration_mock_provider
            cargo test -p hydeclaw-core --test integration_sse_lifecycle
            cargo test -p hydeclaw-core --test integration_shutdown_drain

  # Phase 64 SEC-02: cross-platform path canonicalization matrix.
  # Runs the symlink-escape / .. traversal / mixed-case / UNC matrix on
  # ubuntu + macos + windows so the dunce::canonicalize guard is proven
  # on every supported host OS — no #[cfg(unix)] skips on the portable
  # assertions. Scoped to SEC-02: does NOT pull the full test suite, so
  # total runner time stays well under a minute per OS.
  path-canonicalize-matrix:
    name: SEC-02 path canonicalize (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          key: path-canonicalize-${{ matrix.os }}
      - name: Run path canonicalize integration test
        run: cargo test -p hydeclaw-core --test integration_path_canonicalize -- --nocapture
        shell: bash
