services:
  # ═══════════════════════════════════════════════════
  # Infrastructure (always on)
  # ═══════════════════════════════════════════════════
  postgres:
    image: opex-pg:17-age-pgvector
    mem_limit: ${POSTGRES_MEM_LIMIT:-2g}
    cpus: ${POSTGRES_CPUS:-1.5}
    build:
      context: .
      dockerfile: Dockerfile.postgres
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_DB: opex
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U opex" ]
      interval: 5s
      timeout: 3s
      retries: 5
    networks: [ opex ]
    restart: unless-stopped

  # ═══════════════════════════════════════════════════
  # Tools (always on)
  # ═══════════════════════════════════════════════════
  browser-renderer:
    image: browser-renderer:latest
    mem_limit: ${BROWSER_RENDERER_MEM_LIMIT:-1g}
    cpus: ${BROWSER_RENDERER_CPUS:-1.0}
    build: ./browser-renderer
    ports:
      - "127.0.0.1:9020:9020"
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
      - browser_profiles:/profiles
    healthcheck:
      test: [ "CMD-SHELL", "curl -sf http://localhost:9020/health || exit 1" ]
      interval: 30s
      timeout: 5s
      retries: 3
    networks: [ opex ]
    restart: unless-stopped

  tts-silero:
    image: opex-tts-silero:latest
    mem_limit: ${TTS_SILERO_MEM_LIMIT:-2g}
    cpus: ${TTS_SILERO_CPUS:-4}
    build: ./tts-silero
    ports:
      - "127.0.0.1:8088:8000"
    environment:
      SILERO_MODEL_ID: v5_1_ru
      SILERO_DEVICE: cpu
      SILERO_DEFAULT_SPEAKER: kseniya
      SILERO_THREADS: "4"
    volumes:
      - silero-models:/models
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    healthcheck:
      test: [ "CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\" || exit 1" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 120s
    networks: [ opex ]
    restart: unless-stopped

  # ═══════════════════════════════════════════════════
  # Web search — searxng DISABLED (active websearch = ws-ollama). Uncomment to re-enable.
  # ═══════════════════════════════════════════════════
#  searxng:
#    image: searxng/searxng:latest
#    mem_limit: ${SEARXNG_MEM_LIMIT:-256m}
#    cpus: ${SEARXNG_CPUS:-0.5}
#    environment:
#      # SearXNG entrypoint replaces the `ultrasecretkey` sentinel in settings.yml with this value.
#      SEARXNG_SECRET: ${SEARXNG_SECRET_KEY:-ultrasecretkey}
#    ports:
#      - "127.0.0.1:8080:8080"
#    volumes:
#      - ./config/searxng:/etc/searxng
#      - /etc/localtime:/etc/localtime:ro
#      - /etc/timezone:/etc/timezone:ro
#    healthcheck:
#      test: [ "CMD-SHELL", "wget -qO- http://localhost:8080/healthz || exit 1" ]
#      interval: 30s
#      timeout: 5s
#      retries: 3
#    networks: [ opex ]
#    profiles: [ "on-demand" ]

  # ═══════════════════════════════════════════════════
  # MCP servers (on-demand, managed by core via bollard)
  # ═══════════════════════════════════════════════════
  mcp-stock-analysis:
    container_name: mcp-stock-analysis
    image: opex-mcp-stocks:latest
    mem_limit: ${MCP_DEFAULT_MEM_LIMIT:-384m}
    cpus: ${MCP_DEFAULT_CPUS:-0.5}
    build: ./mcp/stock-analysis
    ports:
      - "127.0.0.1:9003:8000"
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    profiles: [ "on-demand" ]

  mcp-weather:
    container_name: mcp-weather
    image: opex-mcp-weather:latest
    mem_limit: ${MCP_DEFAULT_MEM_LIMIT:-384m}
    cpus: ${MCP_DEFAULT_CPUS:-0.5}
    build: ./mcp/weather
    ports:
      - "127.0.0.1:9004:8000"
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    profiles: [ "on-demand" ]

  mcp-obsidian:
    container_name: mcp-obsidian
    image: opex-mcp-obsidian:latest
    mem_limit: ${MCP_DEFAULT_MEM_LIMIT:-384m}
    cpus: ${MCP_DEFAULT_CPUS:-0.5}
    build: ./mcp/obsidian
    ports:
      - "127.0.0.1:9005:8000"
    volumes:
      - ../workspace:/workspace
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    profiles: [ "on-demand" ]

  mcp-browser-cdp:
    container_name: mcp-browser-cdp
    image: opex-mcp-browser-cdp:latest
    mem_limit: ${MCP_DEFAULT_MEM_LIMIT:-384m}
    cpus: ${MCP_DEFAULT_CPUS:-0.5}
    build: ./mcp/browser-cdp
    ports:
      - "127.0.0.1:9030:9030"
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    profiles: [ "on-demand" ]

  mcp-postgres:
    container_name: mcp-postgres
    image: opex-mcp-postgres:latest
    mem_limit: ${MCP_DEFAULT_MEM_LIMIT:-384m}
    cpus: ${MCP_DEFAULT_CPUS:-0.5}
    build: ./mcp/postgres
    ports:
      - "127.0.0.1:9007:8000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/opex
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks: [ opex ]
    profiles: [ "on-demand" ]

  mcp-fetch:
    container_name: mcp-fetch
    image: opex-mcp-fetch:latest
    mem_limit: ${MCP_DEFAULT_MEM_LIMIT:-384m}
    cpus: ${MCP_DEFAULT_CPUS:-0.5}
    build: ./mcp/fetch
    ports:
      - "127.0.0.1:9040:8000"
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    profiles: [ "on-demand" ]

  mcp-memory:
    container_name: mcp-memory
    image: opex-mcp-memory:latest
    mem_limit: ${MCP_DEFAULT_MEM_LIMIT:-384m}
    cpus: ${MCP_DEFAULT_CPUS:-0.5}
    build: ./mcp/memory
    ports:
      - "127.0.0.1:9041:8000"
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    profiles: [ "on-demand" ]

  mcp-sequential-thinking:
    container_name: mcp-sequential-thinking
    image: opex-mcp-sequential-thinking:latest
    mem_limit: ${MCP_DEFAULT_MEM_LIMIT:-384m}
    cpus: ${MCP_DEFAULT_CPUS:-0.5}
    build: ./mcp/sequential-thinking
    ports:
      - "127.0.0.1:9042:8000"
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    profiles: [ "on-demand" ]

  mcp-time:
    container_name: mcp-time
    image: opex-mcp-time:latest
    mem_limit: ${MCP_DEFAULT_MEM_LIMIT:-384m}
    cpus: ${MCP_DEFAULT_CPUS:-0.5}
    build: ./mcp/time
    ports:
      - "127.0.0.1:9044:8000"
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    profiles: [ "on-demand" ]

  mcp-filesystem:
    container_name: mcp-filesystem
    image: opex-mcp-filesystem:latest
    mem_limit: ${MCP_DEFAULT_MEM_LIMIT:-384m}
    cpus: ${MCP_DEFAULT_CPUS:-0.5}
    build: ./mcp/filesystem
    ports:
      - "127.0.0.1:9045:8000"
    volumes:
      - ~/opex/workspace:/workspace:rw
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    profiles: [ "on-demand" ]

  mcp-git:
    container_name: mcp-git
    image: opex-mcp-git:latest
    mem_limit: ${MCP_DEFAULT_MEM_LIMIT:-384m}
    cpus: ${MCP_DEFAULT_CPUS:-0.5}
    build: ./mcp/git
    ports:
      - "127.0.0.1:9046:8000"
    # Host-uid + identity: git отказывает чужому uid («dubious ownership»), а
    # root-контейнер оставлял бы root-овые .git/objects в хостовом репо; коммит
    # без user.name/email падает «Please tell me who you are».
    user: "${OPEX_UID:-1000}:${OPEX_GID:-1000}"
    environment:
      HOME: /tmp
      GIT_AUTHOR_NAME: "Opex Agent"
      GIT_AUTHOR_EMAIL: "opex@aronmav.ru"
      GIT_COMMITTER_NAME: "Opex Agent"
      GIT_COMMITTER_EMAIL: "opex@aronmav.ru"
    volumes:
      # Workspace mount lets git operate on workspace repositories (e.g. zettelkasten).
      - ~/opex/workspace:/workspace:rw
      # Source tree mount: the deploy git repo lives in ~/opex-src, not inside
      # the runtime workspace. Expose it read-only as /src and make it the
      # default repository in docker/mcp/git/Dockerfile.
      - ~/opex-src:/src:ro
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    profiles: [ "on-demand" ]

  mcp-notion:
    container_name: mcp-notion
    image: opex-mcp-notion:latest
    mem_limit: ${MCP_DEFAULT_MEM_LIMIT:-384m}
    cpus: ${MCP_DEFAULT_CPUS:-0.5}
    build: ./mcp/notion
    ports:
      - "127.0.0.1:9048:8000"
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    profiles: [ "on-demand" ]

  mcp-todoist:
    container_name: mcp-todoist
    image: opex-mcp-todoist:latest
    mem_limit: ${MCP_DEFAULT_MEM_LIMIT:-384m}
    cpus: ${MCP_DEFAULT_CPUS:-0.5}
    build: ./mcp/todoist
    ports:
      - "127.0.0.1:9049:8000"
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    profiles: [ "on-demand" ]

networks:
  opex:
    name: opex
    driver: bridge

volumes:
  pgdata:
  silero-models:
  browser_profiles:
