name: search_web
description: "Web search. Returns results with page-content snippets. Optional `provider` selects a specific active web-search provider; omit to use the highest-priority one."
endpoint: "http://localhost:9011/v1/search"
method: POST
parallel: true
parameters:
  query:
    type: string
    required: true
    location: body
    description: "Search query"
  max_results:
    type: integer
    required: false
    location: body
    description: "Maximum number of results (default 5)"
    default: 5
  provider:
    type: string
    required: false
    location: body
    description: "Active web-search provider name (omit for the highest-priority one)"
    default: ""
body_template: |
  {"query": "{{query}}", "max_results": {{max_results}}, "provider": "{{provider}}"}
response_transform: "$.results"

status: verified
